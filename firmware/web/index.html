<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <title>Buckshot IRL</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main>
    <header class="topline">
      <div>
        <p class="kicker">live terminal</p>
        <h1>Buckshot IRL</h1>
        <p id="session" class="phase">Connecting</p>
      </div>
      <button id="refresh" type="button" aria-label="Refresh table state">Refresh</button>
    </header>

    <section id="register" class="panel">
      <h2>Join</h2>
      <label>Name <input id="name" maxlength="15" autocomplete="off"></label>
      <button id="join" type="button">Join game</button>
    </section>

    <section id="admin" class="panel hidden">
      <h2>Admin</h2>
      <div class="grid">
        <label>Lives <input id="lives" type="number" min="1" max="9" value="3"></label>
        <label>Shells <input id="shells" type="number" min="2" max="8" value="6"></label>
        <label>Live shells <input id="live" type="number" min="1" max="7" value="3"></label>
        <label>Items/player <input id="items" type="number" min="0" max="8" value="2"></label>
      </div>
      <div class="row">
        <button id="saveSetup" type="button">Save setup</button>
        <button id="start" type="button">Start round</button>
        <button id="reset" type="button">Reset</button>
      </div>
      <h3>NFC writer</h3>
      <p id="writeMode"></p>
      <div class="row wrap">
        <button id="toggleWriteMode" type="button">Toggle NFC write mode</button>
        <button id="openWriteDialog" type="button" class="hidden">Write NFC tag</button>
        <button id="testNfcAdmin" type="button">Test NFC read</button>
      </div>
      <p id="writeStatus"></p>
    </section>

    <section id="status" class="panel">
      <h2>Table</h2>
      <div id="players"></div>
      <div id="shotgun"></div>
      <p id="message" class="message"></p>
    </section>

    <section id="actions" class="panel hidden">
      <h2>Actions</h2>
      <div id="targets" class="row wrap"></div>
      <div class="row wrap">
        <button id="armSelf" type="button">Arm self shot</button>
        <button id="armTarget" type="button">Arm target shot</button>
      </div>
      <h3>Items</h3>
      <div id="inventory" class="row wrap"></div>
      <h3>NFC scanner</h3>
      <button id="scan" type="button">Scan item tag</button>
      <button id="testNfc" type="button">Test NFC read</button>
      <p id="nfc"></p>
    </section>
  </main>
  <div id="nfcWriteDialog" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="popup-head">
        <h2>Write NFC Tag</h2>
        <button id="cancelWrite" type="button">Cancel</button>
      </div>
      <p id="writePrompt">Choose an item to write.</p>
      <div class="row wrap" id="writer"></div>
      <div class="tag-graphic" aria-hidden="true"></div>
      <p id="writeProgress"></p>
    </div>
  </div>
  <div class="rotate-lock" role="status" aria-live="polite">
    <div class="rotate-card">
      <div class="rotate-icon" aria-hidden="true">▯</div>
      <h2>Rotate device</h2>
      <p>This terminal runs best in landscape.</p>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
