<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-orientation" content="landscape">
  <title>Buckshot IRL</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main>
    <section class="hud" aria-live="polite">
      <div class="topline">
        <div>
          <p class="kicker">live terminal</p>
          <h1 id="turnTitle">Syncing</h1>
        </div>
      </div>

      <div id="life" class="life-pack" aria-label="Life meter"></div>
      <div id="hudActions" class="hud-actions hidden">
        <button id="shot" type="button">Shoot</button>
        <button id="adminToggle" type="button" class="hidden">Admin</button>
        <button id="debugToggle" type="button">Debug</button>
      </div>
      <p id="session" class="phase">connecting</p>
      <p id="message" class="message"></p>
    </section>
  </main>

  <div id="targetDialog" class="popup hidden" role="dialog" aria-modal="true" aria-labelledby="targetTitle">
    <div class="popup-card">
      <div class="popup-head">
        <h2 id="targetTitle">Shot target</h2>
        <button id="closeTarget" type="button">Close</button>
      </div>
      <div id="targets" class="target-grid"></div>
    </div>
  </div>

  <div id="joinPanel" class="popup hidden" role="dialog" aria-modal="true" aria-labelledby="joinTitle">
    <div class="popup-card">
      <div class="popup-head">
        <h2 id="joinTitle">Sign in</h2>
      </div>
      <label>Name <input id="name" maxlength="15" autocomplete="off"></label>
      <button id="join" class="scan-button" type="button">Join game</button>
      <p id="joinStatus" class="message"></p>
    </div>
  </div>

  <div id="adminPanel" class="debug-panel hidden">
    <div class="popup-head">
      <h2>Admin</h2>
      <button id="closeAdmin" type="button">Close</button>
    </div>
    <div class="admin-grid">
      <label>Lives <input id="lives" type="number" min="1" max="9" value="3"></label>
      <label>Shells <input id="shells" type="number" min="2" max="8" value="6"></label>
      <label>Live shells <input id="live" type="number" min="1" max="7" value="3"></label>
      <label>Items/player <input id="items" type="number" min="0" max="8" value="2"></label>
    </div>
    <div class="admin-actions">
      <button id="saveSetup" type="button">Save setup</button>
      <button id="start" type="button">Start round</button>
      <button id="reset" type="button">Reset</button>
    </div>
    <p id="adminStatus" class="message"></p>
  </div>

  <div id="debugPanel" class="debug-panel hidden">
    <div class="popup-head">
      <h2>Debug NFC</h2>
      <button id="closeDebug" type="button">Close</button>
    </div>
    <div id="inventory" class="inventory-grid"></div>
    <button id="scan" class="scan-button" type="button">Scan tag</button>
    <p id="nfc" class="message"></p>
  </div>

  <div class="rotate-lock" role="status" aria-live="polite">
    <div class="rotate-card">
      <div class="rotate-icon" aria-hidden="true">▯</div>
      <h2>Rotate device</h2>
      <p>This terminal runs in landscape.</p>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
